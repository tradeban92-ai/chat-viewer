<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat History Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f14; --surface:#13161e; --surface2:#1a1e2a;
    --border:rgba(255,255,255,0.07); --accent:#6c63ff;
    --text:#e8eaf0; --muted:#6b7280;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

  .topbar{display:flex;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
  .topbar-title{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent);padding:14px 20px;border-right:1px solid var(--border);white-space:nowrap;}
  .tabs{display:flex;flex:1;}
  .tab{padding:14px 24px;font-size:13px;cursor:pointer;color:var(--muted);border-right:1px solid var(--border);transition:all 0.18s;position:relative;white-space:nowrap;}
  .tab:hover{color:var(--text);background:var(--surface2);}
  .tab.active{color:var(--text);background:var(--surface2);}
  .tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);}
  .tab .badge{display:inline-block;background:var(--accent);color:white;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:7px;vertical-align:middle;}
  .refresh-info{margin-left:auto;padding:0 20px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px;white-space:nowrap;}
  .dot{width:7px;height:7px;border-radius:50%;background:#43e97b;flex-shrink:0;}
  .dot.live{animation:pulse 2s infinite;}
  .dot.error{background:#ff4d4d;animation:none;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

  .body{display:flex;flex:1;overflow:hidden;}

  .sidebar{width:290px;min-width:290px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .search-box{margin:12px;position:relative;}
  .search-box input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px 9px 34px;color:var(--text);font-family:'Golos Text',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;}
  .search-box input:focus{border-color:var(--accent);}
  .search-box input::placeholder{color:var(--muted);}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:0.35;}
  .user-list{flex:1;overflow-y:auto;padding:6px;}
  .user-list::-webkit-scrollbar{width:3px;}
  .user-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .user-card{border-radius:11px;padding:11px 13px;margin-bottom:3px;cursor:pointer;border:1px solid transparent;transition:all 0.15s;}
  .user-card:hover{background:var(--surface2);border-color:var(--border);}
  .user-card.active{background:var(--surface2);border-color:var(--accent);box-shadow:0 4px 18px rgba(108,99,255,0.12);}
  .uc-top{display:flex;align-items:center;gap:9px;}
  .avatar{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:600;flex-shrink:0;}
  .uinfo{flex:1;min-width:0;}
  .uname{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .umeta{font-size:10px;color:var(--muted);margin-top:1px;}
  .ucnt{background:var(--accent);color:white;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;}
  .ulast{font-size:11px;color:var(--muted);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .chat-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:var(--surface);}
  .ch-avatar{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;}
  .ch-info h2{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;}
  .ch-info p{font-size:11px;color:var(--muted);margin-top:2px;}
  .ch-stats{margin-left:auto;display:flex;gap:20px;}
  .stat{text-align:center;}
  .stat-v{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:600;color:var(--accent);}
  .stat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;}

  .chat-messages{flex:1;overflow-y:auto;padding:18px 24px;display:flex;flex-direction:column;gap:4px;}
  .chat-messages::-webkit-scrollbar{width:3px;}
  .chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  .date-sep{text-align:center;margin:12px 0 6px;}
  .date-sep span{font-size:10px;color:var(--muted);background:var(--surface2);padding:3px 12px;border-radius:20px;border:1px solid var(--border);font-family:'Unbounded',sans-serif;font-weight:300;}

  .msg-row{display:flex;gap:9px;animation:up 0.18s ease forwards;opacity:0;}
  @keyframes up{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .msg-row.user{flex-direction:row-reverse;}
  .msg-av{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;align-self:flex-end;font-family:'Unbounded',sans-serif;}
  .bw{display:flex;flex-direction:column;max-width:63%;}
  .msg-row.user .bw{align-items:flex-end;}
  .bubble{padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
  .msg-row.user .bubble{background:#1e2235;border:1px solid rgba(108,99,255,0.2);border-bottom-right-radius:3px;}
  .msg-row.bot .bubble{background:#1a2a1f;border:1px solid rgba(67,233,123,0.15);border-bottom-left-radius:3px;}
  .btime{font-size:9px;color:var(--muted);margin-top:3px;}
  .msg-row.user .btime{text-align:right;}

  .nav-wrap{text-align:center;margin:3px 0;}
  .nav-pill{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 11px;font-size:10px;color:var(--muted);font-style:italic;}

  .tag{display:inline-block;font-size:8px;font-family:'Unbounded',sans-serif;font-weight:600;padding:2px 7px;border-radius:3px;margin-bottom:4px;letter-spacing:0.06em;text-transform:uppercase;}
  .t-booking{background:rgba(67,233,123,0.12);color:#43e97b;border:1px solid rgba(67,233,123,0.25);}
  .t-price{background:rgba(247,183,49,0.12);color:#f7b731;border:1px solid rgba(247,183,49,0.25);}
  .t-faq{background:rgba(69,170,242,0.12);color:#45aaf2;border:1px solid rgba(69,170,242,0.25);}
  .t-contra{background:rgba(255,101,132,0.12);color:#ff6584;border:1px solid rgba(255,101,132,0.25);}
  .t-human{background:rgba(255,77,77,0.15);color:#ff4d4d;border:1px solid rgba(255,77,77,0.3);}
  .t-service{background:rgba(108,99,255,0.12);color:#6c63ff;border:1px solid rgba(108,99,255,0.25);}
  .t-other{background:rgba(120,120,120,0.1);color:#888;border:1px solid rgba(120,120,120,0.2);}

  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:14px;}
  .empty svg{opacity:0.2;}
  .empty p{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:300;letter-spacing:0.06em;}

  .loading-state{flex:1;display:flex;align-items:center;justify-content:center;gap:12px;color:var(--muted);font-size:13px;}
  .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* Error panel */
  .err-panel{margin:16px;background:rgba(255,77,77,0.08);border:1px solid rgba(255,77,77,0.25);border-radius:12px;padding:18px 20px;display:none;}
  .err-panel h3{font-family:'Unbounded',sans-serif;font-size:12px;color:#ff6b6b;margin-bottom:10px;}
  .err-panel p{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:8px;}
  .err-panel code{background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:11px;color:#45aaf2;}
  .retry-btn{margin-top:12px;background:var(--accent);color:white;border:none;border-radius:8px;padding:8px 16px;font-family:'Golos Text',sans-serif;font-size:12px;cursor:pointer;transition:opacity 0.2s;}
  .retry-btn:hover{opacity:0.8;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">💬 Чаты</div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab(0)" id="tab0">Таблица 1 <span class="badge" id="badge0">...</span></div>
    <div class="tab" onclick="switchTab(1)" id="tab1">Таблица 2 <span class="badge" id="badge1">...</span></div>
  </div>
  <div class="refresh-info">
    <div class="dot live" id="statusDot"></div>
    <span id="refreshLabel">Загрузка...</span>
  </div>
</div>

<div class="body">
  <div class="sidebar">
    <div class="search-box">
      <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Поиск по имени..." id="searchInput" oninput="renderList()">
    </div>
    <div class="user-list" id="userList">
      <div class="loading-state"><div class="spinner"></div> Загрузка...</div>
    </div>
  </div>
  <div class="main" id="main">
    <div class="empty">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>Выберите пользователя</p>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════
//  НАСТРОЙКИ
// ══════════════════════════════════
const SOURCES = [
  {
    name: "Таблица 1",
    url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTuk8xEPRYJ-vZTTL7Wotbgmk-B9tpJNkaikgtDA3WFAG4sPzi6StIs5HVH5dP6mGT_mtlh9QS4VyA8/pub?gid=0&single=true&output=csv"
  },
  {
    name: "Таблица 2",
    url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTzaquYHpkjMCMq7jmL6yMhDWc3f-Lo2nM9837jctpnGWKHdF-DBI0D02XhH2QN57eEuzli2AaKd-Wz/pub?gid=0&single=true&output=csv"
  }
];
const REFRESH_MS = 30000; // 30 секунд

// CORS-прокси (публичные, бесплатные)
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://cors-anywhere.herokuapp.com/${url}`,
];
// ══════════════════════════════════

const COLORS = [
  ["#6c63ff","#1e1a3d"],["#ff6584","#3d1a22"],["#43e97b","#1a3d28"],
  ["#f7b731","#3d3010"],["#45aaf2","#1a2d3d"],["#fd9644","#3d2510"],
  ["#a29bfe","#201d3d"],["#fd79a8","#3d1a2d"],["#55efc4","#1a3d33"],
];
const colorMap={};let ci=0;
const getColor=uid=>{if(!colorMap[uid])colorMap[uid]=COLORS[ci++%COLORS.length];return colorMap[uid];};

const TAG_CLASS={ask_booking:"t-booking",booking_start:"t-booking",ask_price:"t-price",ask_faq:"t-faq",ask_location:"t-faq",ask_contraindications:"t-contra",needs_human:"t-human",ask_services:"t-service",ask_indications:"t-service"};
const TAG_LABEL={ask_indications:"показания",ask_price:"цена",ask_booking:"запись",booking_start:"запись",ask_faq:"FAQ",ask_location:"адрес",ask_contraindications:"⚠ противопоказания",needs_human:"🔴 оператор",ask_services:"услуги",other:"другое",browse_menu:"меню",view_service:"просмотр",ask_question:"вопрос"};

function parseLine(line){
  const res=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===','&&!inQ){res.push(cur.trim());cur='';}
    else cur+=ch;
  }
  res.push(cur.trim());
  return res;
}

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  const headers=parseLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).filter(l=>l.trim()).map(l=>{
    const vals=parseLine(l);
    const obj={};
    headers.forEach((h,i)=>{obj[h]=(vals[i]||'').replace(/^"|"$/g,'');});
    return obj;
  });
}

function normalize(row){
  return {
    ts:   row['ts']||row['date']||'',
    name: row['user_name']||row['name']||row['user']||'',
    uid:  row['user_id']||row['uid']||'',
    role: (row['role']||'').toLowerCase(),
    text: row['text']||'',
    intent: row['intent']||row['tag']||'',
    reply:  row['ответ бота']||row['bot_reply']||row['reply']||'',
  };
}

function buildUsers(rows){
  const map={};
  rows.forEach(r=>{
    const uid=r.uid||r.name; if(!uid||!r.name)return;
    if(!map[uid])map[uid]={uid,name:r.name,msgs:[]};
    map[uid].msgs.push(r);
  });
  return Object.values(map);
}

// Try each proxy until one works
async function fetchCSV(rawUrl){
  for(const makeProxy of PROXIES){
    try{
      const res=await fetch(makeProxy(rawUrl),{cache:'no-store'});
      if(!res.ok)continue;
      const text=await res.text();
      if(text.includes(','))return text; // looks like CSV
    }catch(e){/* try next */}
  }
  throw new Error('All proxies failed');
}

let tableData=[[],[]];
let activeTab=0,activeUid=null;

async function fetchTable(idx){
  try{
    const text=await fetchCSV(SOURCES[idx].url);
    const rows=parseCSV(text).map(normalize).filter(r=>r.uid&&r.name);
    tableData[idx]=buildUsers(rows);
    document.getElementById('badge'+idx).textContent=tableData[idx].length;
    return true;
  }catch(e){
    console.error('Tab',idx,'error:',e);
    document.getElementById('badge'+idx).textContent='!';
    return false;
  }
}

async function loadAll(silent){
  if(!silent){
    document.getElementById('userList').innerHTML='<div class="loading-state"><div class="spinner"></div> Загрузка...</div>';
  }
  const results=await Promise.all([fetchTable(0),fetchTable(1)]);
  const ok=results.every(Boolean);
  const dot=document.getElementById('statusDot');
  dot.className='dot '+(ok?'live':'error');

  const now=new Date();
  const time=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  document.getElementById('refreshLabel').textContent=ok?`Обновлено в ${time}`:`Ошибка загрузки · ${time}`;

  renderList();
  if(activeUid){
    const u=tableData[activeTab].find(u=>u.uid===activeUid);
    if(u)renderChat(u,false);
  }
}

function switchTab(idx){
  activeTab=idx;activeUid=null;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.getElementById('searchInput').value='';
  renderList();
  document.getElementById('main').innerHTML=`<div class="empty">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <p>Выберите пользователя</p></div>`;
}

function renderList(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const users=(tableData[activeTab]||[]).filter(u=>u.name.toLowerCase().includes(q));
  const el=document.getElementById('userList');el.innerHTML='';
  if(!users.length){
    el.innerHTML='<div style="text-align:center;color:var(--muted);padding:30px 10px;font-size:12px;">Нет данных</div>';
    return;
  }
  users.forEach(u=>{
    const [ac,bg]=getColor(u.uid);
    const ini=u.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'??';
    const cnt=u.msgs.filter(m=>m.role==='user'&&!m.text.startsWith('[')).length;
    const last=u.msgs.filter(m=>m.role==='user'&&!m.text.startsWith('[')).slice(-1)[0];
    const d=document.createElement('div');
    d.className='user-card'+(u.uid===activeUid?' active':'');
    d.onclick=()=>openUser(u.uid);
    d.innerHTML=`<div class="uc-top">
      <div class="avatar" style="background:${bg};color:${ac}">${ini}</div>
      <div class="uinfo"><div class="uname">${u.name}</div><div class="umeta">ID: ${u.uid}</div></div>
      <span class="ucnt">${cnt}</span></div>
      ${last?`<div class="ulast">${last.text}</div>`:''}`;
    el.appendChild(d);
  });
}

function openUser(uid){
  activeUid=uid;renderList();
  const u=tableData[activeTab].find(u=>u.uid===uid);
  if(u)renderChat(u,true);
}

function renderChat(u,scrollToBottom){
  const [ac,bg]=getColor(u.uid);
  const ini=u.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'??';
  const qCnt=u.msgs.filter(m=>m.role==='user'&&!m.text.startsWith('[')).length;
  const bCnt=u.msgs.filter(m=>m.role==='bot'&&m.reply).length;
  const days=new Set(u.msgs.map(m=>m.ts.split(' ')[0])).size;

  const existing=document.getElementById('cm');
  const wasBottom=existing?(existing.scrollHeight-existing.scrollTop-existing.clientHeight<80):true;

  document.getElementById('main').innerHTML=`
    <div class="chat-header">
      <div class="ch-avatar" style="background:${bg};color:${ac}">${ini}</div>
      <div class="ch-info"><h2>${u.name}</h2><p>UID: ${u.uid}</p></div>
      <div class="ch-stats">
        <div class="stat"><div class="stat-v">${qCnt}</div><div class="stat-l">Вопросов</div></div>
        <div class="stat"><div class="stat-v">${bCnt}</div><div class="stat-l">Ответов</div></div>
        <div class="stat"><div class="stat-v">${days}</div><div class="stat-l">Дней</div></div>
      </div>
    </div>
    <div class="chat-messages" id="cm"></div>`;

  const cm=document.getElementById('cm');
  let lastDate=null,delay=0;

  u.msgs.forEach(msg=>{
    const[d,t]=(msg.ts+' ').split(' ');
    const isNav=msg.text&&msg.text.startsWith('[');
    const displayText=msg.role==='user'?msg.text:msg.reply;

    if(d&&d!==lastDate){
      const s=document.createElement('div');s.className='date-sep';
      s.innerHTML=`<span>${d}</span>`;cm.appendChild(s);lastDate=d;
    }
    if(isNav){
      const w=document.createElement('div');w.className='nav-wrap';
      w.innerHTML=`<span class="nav-pill">🔘 ${msg.text}${t?' · '+t:''}</span>`;
      cm.appendChild(w);return;
    }
    if(!displayText)return;

    const isUser=msg.role==='user';
    const row=document.createElement('div');
    row.className='msg-row '+(isUser?'user':'bot');
    row.style.animationDelay=delay+'ms';delay+=28;

    const avS=isUser?`style="background:${bg};color:${ac}"`:`style="background:#1a3d28;color:#43e97b"`;
    const tc=TAG_CLASS[msg.intent]||'t-other';
    const tl=TAG_LABEL[msg.intent]||msg.intent;
    const tagHtml=msg.intent&&isUser&&!['browse_menu','view_service'].includes(msg.intent)?`<div class="tag ${tc}">${tl}</div>`:'';

    row.innerHTML=`
      <div class="msg-av" ${avS}>${isUser?ini:'🤖'}</div>
      <div class="bw">${tagHtml}<div class="bubble">${displayText}</div><div class="btime">${t||''}</div></div>`;
    cm.appendChild(row);
  });

  if(scrollToBottom||wasBottom)cm.scrollTop=cm.scrollHeight;
}

// Start
loadAll(false);
setInterval(()=>loadAll(true),REFRESH_MS);
</script>
</body>
</html>
