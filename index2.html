<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chat History Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f14; --surface:#13161e; --surface2:#1a1e2a;
    --border:rgba(255,255,255,0.07); --accent:#6c63ff;
    --text:#e8eaf0; --muted:#6b7280;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

  /* ── TOPBAR ── */
  .topbar{display:flex;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;min-height:48px;}
  .topbar-title{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--accent);padding:0 14px;border-right:1px solid var(--border);white-space:nowrap;height:100%;display:flex;align-items:center;}
  .tabs{display:flex;flex:1;overflow-x:auto;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{padding:0 16px;font-size:12px;cursor:pointer;color:var(--muted);border-right:1px solid var(--border);transition:all 0.15s;position:relative;white-space:nowrap;height:48px;display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .tab:hover{color:var(--text);background:var(--surface2);}
  .tab.active{color:var(--text);background:var(--surface2);}
  .tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);}
  .badge{background:var(--accent);color:white;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;}
  .refresh-info{padding:0 12px;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0;}
  .dot{width:6px;height:6px;border-radius:50%;background:#43e97b;flex-shrink:0;}
  .dot.live{animation:pulse 2s infinite;}
  .dot.err{background:#ff4d4d;animation:none;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

  /* ── LAYOUT ── */
  .body{display:flex;flex:1;overflow:hidden;}

  /* ── SIDEBAR ── */
  .sidebar{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform 0.25s ease;}
  .search-box{margin:10px;position:relative;}
  .search-box input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 10px 8px 32px;color:var(--text);font-family:'Golos Text',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;}
  .search-box input:focus{border-color:var(--accent);}
  .search-box input::placeholder{color:var(--muted);}
  .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);opacity:0.35;}
  .user-list{flex:1;overflow-y:auto;padding:6px;}
  .user-list::-webkit-scrollbar{width:3px;}
  .user-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .user-card{border-radius:10px;padding:10px 12px;margin-bottom:3px;cursor:pointer;border:1px solid transparent;transition:all 0.15s;}
  .user-card:hover{background:var(--surface2);border-color:var(--border);}
  .user-card.active{background:var(--surface2);border-color:var(--accent);box-shadow:0 4px 16px rgba(108,99,255,0.12);}
  .uc-top{display:flex;align-items:center;gap:9px;}
  .avatar{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;flex-shrink:0;}
  .uinfo{flex:1;min-width:0;}
  .uname{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .umeta{font-size:10px;color:var(--muted);margin-top:1px;}
  .ucnt{background:var(--accent);color:white;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;flex-shrink:0;}
  .ulast{font-size:11px;color:var(--muted);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* ── MAIN ── */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

  /* mobile back button */
  .back-btn{display:none;align-items:center;gap:8px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);font-size:13px;color:var(--accent);cursor:pointer;flex-shrink:0;}
  .back-btn svg{flex-shrink:0;}

  .chat-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);flex-shrink:0;}
  .ch-avatar{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;flex-shrink:0;}
  .ch-info{flex:1;min-width:0;}
  .ch-info h2{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ch-info p{font-size:11px;color:var(--muted);margin-top:2px;}
  .ch-stats{display:flex;gap:16px;flex-shrink:0;}
  .stat{text-align:center;}
  .stat-v{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600;color:var(--accent);}
  .stat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-top:1px;}

  /* ── CHAT MESSAGES ── */
  .chat-messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:4px;}
  .chat-messages::-webkit-scrollbar{width:3px;}
  .chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  .date-sep{text-align:center;margin:12px 0 6px;}
  .date-sep span{font-size:10px;color:var(--muted);background:var(--surface2);padding:3px 12px;border-radius:20px;border:1px solid var(--border);font-family:'Unbounded',sans-serif;font-weight:300;}

  .msg-row{display:flex;gap:8px;animation:up 0.18s ease forwards;opacity:0;}
  @keyframes up{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
  .msg-row.user{flex-direction:row-reverse;}
  .msg-av{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;align-self:flex-end;font-family:'Unbounded',sans-serif;}
  .bw{display:flex;flex-direction:column;max-width:75%;}
  .msg-row.user .bw{align-items:flex-end;}
  .bubble{padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.55;white-space:pre-wrap;word-break:break-word;}
  .msg-row.user .bubble{background:#1e2235;border:1px solid rgba(108,99,255,0.2);border-bottom-right-radius:3px;}
  .msg-row.bot .bubble{background:#1a2a1f;border:1px solid rgba(67,233,123,0.15);border-bottom-left-radius:3px;}
  .btime{font-size:9px;color:var(--muted);margin-top:3px;}
  .msg-row.user .btime{text-align:right;}

  .nav-wrap{text-align:center;margin:3px 0;}
  .nav-pill{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:10px;color:var(--muted);font-style:italic;}

  .tag{display:inline-block;font-size:8px;font-family:'Unbounded',sans-serif;font-weight:600;padding:2px 6px;border-radius:3px;margin-bottom:4px;letter-spacing:0.05em;text-transform:uppercase;}
  .t-booking{background:rgba(67,233,123,0.12);color:#43e97b;border:1px solid rgba(67,233,123,0.25);}
  .t-price{background:rgba(247,183,49,0.12);color:#f7b731;border:1px solid rgba(247,183,49,0.25);}
  .t-faq{background:rgba(69,170,242,0.12);color:#45aaf2;border:1px solid rgba(69,170,242,0.25);}
  .t-contra{background:rgba(255,101,132,0.12);color:#ff6584;border:1px solid rgba(255,101,132,0.25);}
  .t-human{background:rgba(255,77,77,0.15);color:#ff4d4d;border:1px solid rgba(255,77,77,0.3);}
  .t-service{background:rgba(108,99,255,0.12);color:#6c63ff;border:1px solid rgba(108,99,255,0.25);}
  .t-other{background:rgba(120,120,120,0.1);color:#888;border:1px solid rgba(120,120,120,0.2);}

  /* ── USERS TABLE (tab 2) ── */
  .users-panel{flex:1;overflow-y:auto;padding:16px 20px;}
  .users-panel::-webkit-scrollbar{width:3px;}
  .users-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .user-profile-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:10px;transition:border-color 0.15s;}
  .user-profile-card:hover{border-color:rgba(108,99,255,0.4);}
  .upc-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .upc-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;flex-shrink:0;}
  .upc-name{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600;}
  .upc-id{font-size:11px;color:var(--muted);margin-top:2px;}
  .upc-dates{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
  .upc-date{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:11px;}
  .upc-date-label{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:0.06em;font-family:'Unbounded',sans-serif;margin-bottom:2px;}
  .upc-date-val{color:var(--text);font-weight:500;}
  .upc-memory{background:var(--surface2);border:1px solid rgba(108,99,255,0.2);border-radius:10px;padding:10px 14px;}
  .upc-memory-label{font-size:9px;color:var(--accent);text-transform:uppercase;letter-spacing:0.07em;font-family:'Unbounded',sans-serif;margin-bottom:6px;}
  .upc-memory-text{font-size:13px;color:var(--text);line-height:1.6;}

  /* ── EMPTY / LOADING ── */
  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:14px;}
  .empty svg{opacity:0.2;}
  .empty p{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:300;letter-spacing:0.06em;}
  .loading-s{flex:1;display:flex;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:12px;}
  .spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ── MOBILE ── */
  @media(max-width:640px){
    .topbar-title{display:none;}
    .refresh-info span{display:none;}
    .sidebar{position:absolute;top:48px;left:0;bottom:0;z-index:100;width:100%;min-width:unset;transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,0.5);}
    .sidebar.hidden{transform:translateX(-100%);}
    .main{width:100%;}
    .back-btn{display:flex;}
    .ch-stats{display:none;}
    .bw{max-width:82%;}
    .chat-header{padding:10px 14px;}
    .chat-messages{padding:12px 14px;}
    .users-panel{padding:12px 14px;}
    .upc-dates{gap:8px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">💬 Чаты</div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab(0)" id="tab0">Сообщения <span class="badge" id="badge0">...</span></div>
    <div class="tab" onclick="switchTab(1)" id="tab1">Пользователи <span class="badge" id="badge1">...</span></div>
  </div>
  <div class="refresh-info">
    <div class="dot live" id="statusDot"></div>
    <span id="refreshLabel">Загрузка...</span>
  </div>
</div>

<div class="body">
  <!-- SIDEBAR (tab 0) -->
  <div class="sidebar" id="sidebar">
    <div class="search-box">
      <svg class="si" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Поиск по имени..." id="searchInput" oninput="renderList()">
    </div>
    <div class="user-list" id="userList">
      <div class="loading-s"><div class="spinner"></div> Загрузка...</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div class="empty">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>Выберите пользователя</p>
    </div>
  </div>
</div>

<script>
const SOURCES = [
  { name:"Сообщения", url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTuk8xEPRYJ-vZTTL7Wotbgmk-B9tpJNkaikgtDA3WFAG4sPzi6StIs5HVH5dP6mGT_mtlh9QS4VyA8/pub?gid=0&single=true&output=csv" },
  { name:"Пользователи", url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTzaquYHpkjMCMq7jmL6yMhDWc3f-Lo2nM9837jctpnGWKHdF-DBI0D02XhH2QN57eEuzli2AaKd-Wz/pub?gid=0&single=true&output=csv" }
];
const REFRESH_MS = 30000;
const PROXIES = [
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
];

const COLORS=[["#6c63ff","#1e1a3d"],["#ff6584","#3d1a22"],["#43e97b","#1a3d28"],["#f7b731","#3d3010"],["#45aaf2","#1a2d3d"],["#fd9644","#3d2510"],["#a29bfe","#201d3d"],["#fd79a8","#3d1a2d"]];
const colorMap={};let ci=0;
const getColor=uid=>{if(!colorMap[uid])colorMap[uid]=COLORS[ci++%COLORS.length];return colorMap[uid];};

const TAG_CLASS={ask_booking:"t-booking",booking_start:"t-booking",ask_price:"t-price",ask_faq:"t-faq",ask_location:"t-faq",ask_contraindications:"t-contra",needs_human:"t-human",ask_services:"t-service",ask_indications:"t-service"};
const TAG_LABEL={ask_indications:"показания",ask_price:"цена",ask_booking:"запись",booking_start:"запись",ask_faq:"FAQ",ask_location:"адрес",ask_contraindications:"⚠ противопоказания",needs_human:"🔴 оператор",ask_services:"услуги",other:"другое",browse_menu:"меню",view_service:"просмотр",ask_question:"вопрос"};

function parseLine(line){
  const res=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===','&&!inQ){res.push(cur.trim());cur='';}
    else cur+=ch;
  }
  res.push(cur.trim());return res;
}
function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  const headers=parseLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).filter(l=>l.trim()).map(l=>{
    const vals=parseLine(l);const obj={};
    headers.forEach((h,i)=>{obj[h]=(vals[i]||'').replace(/^"|"$/g,'');});
    return obj;
  });
}
function normalizeMsg(r){
  return{ts:r['ts']||r['date']||'',name:r['user_name']||r['name']||r['user']||'',uid:r['user_id']||r['uid']||'',role:(r['role']||'').toLowerCase(),text:r['text']||'',intent:r['intent']||r['tag']||'',reply:r['ответ бота']||r['bot_reply']||r['reply']||''};
}
function buildUsers(rows){
  const map={};
  rows.forEach(r=>{const uid=r.uid||r.name;if(!uid||!r.name)return;if(!map[uid])map[uid]={uid,name:r.name,msgs:[]};map[uid].msgs.push(r);});
  return Object.values(map);
}

async function fetchCSV(rawUrl){
  for(const mk of PROXIES){
    try{
      const res=await fetch(mk(rawUrl),{cache:'no-store'});
      if(!res.ok)continue;
      const text=await res.text();
      if(text.includes(','))return text;
    }catch(e){}
  }
  throw new Error('All proxies failed');
}

let tableData=[[],[]]; // tab0: users-with-msgs, tab1: raw user rows
let activeTab=0,activeUid=null;

async function fetchTable(idx){
  try{
    const text=await fetchCSV(SOURCES[idx].url);
    const rows=parseCSV(text);
    if(idx===0){
      tableData[0]=buildUsers(rows.map(normalizeMsg).filter(r=>r.uid&&r.name));
    } else {
      tableData[1]=rows.filter(r=>r['user_name']||r['name']);
    }
    document.getElementById('badge'+idx).textContent=tableData[idx].length;
    return true;
  }catch(e){
    document.getElementById('badge'+idx).textContent='!';
    return false;
  }
}

async function loadAll(silent){
  if(!silent) document.getElementById('userList').innerHTML='<div class="loading-s"><div class="spinner"></div> Загрузка...</div>';
  const results=await Promise.all([fetchTable(0),fetchTable(1)]);
  const ok=results.some(Boolean);
  const dot=document.getElementById('statusDot');
  dot.className='dot '+(ok?'live':'err');
  const now=new Date();
  const t=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  document.getElementById('refreshLabel').textContent=`${t}`;
  if(activeTab===0){
    renderList();
    if(activeUid){const u=tableData[0].find(u=>u.uid===activeUid);if(u)renderChat(u,false);}
  } else {
    renderUsersTab();
  }
}

function switchTab(idx){
  activeTab=idx;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  const sb=document.getElementById('sidebar');
  if(idx===0){
    sb.style.display='flex';
    renderList();
    document.getElementById('main').innerHTML=`<div class="empty"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>Выберите пользователя</p></div>`;
  } else {
    sb.style.display='none';
    renderUsersTab();
  }
  activeUid=null;
}

/* ── TAB 0: messages ── */
function renderList(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const users=(tableData[0]||[]).filter(u=>u.name.toLowerCase().includes(q));
  const el=document.getElementById('userList');el.innerHTML='';
  if(!users.length){el.innerHTML='<div style="text-align:center;color:var(--muted);padding:24px 10px;font-size:12px;">Нет данных</div>';return;}
  users.forEach(u=>{
    const[ac,bg]=getColor(u.uid);
    const ini=u.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'??';
    const cnt=u.msgs.filter(m=>m.role==='user'&&!m.text.startsWith('[')).length;
    const last=u.msgs.filter(m=>m.role==='user'&&!m.text.startsWith('[')).slice(-1)[0];
    const d=document.createElement('div');
    d.className='user-card'+(u.uid===activeUid?' active':'');
    d.onclick=()=>openUser(u.uid);
    d.innerHTML=`<div class="uc-top"><div class="avatar" style="background:${bg};color:${ac}">${ini}</div><div class="uinfo"><div class="uname">${u.name}</div><div class="umeta">ID: ${u.uid}</div></div><span class="ucnt">${cnt}</span></div>${last?`<div class="ulast">${last.text}</div>`:''}`;
    el.appendChild(d);
  });
}

function openUser(uid){
  activeUid=uid;renderList();
  const u=tableData[0].find(u=>u.uid===uid);
  if(u){
    renderChat(u,true);
    // mobile: hide sidebar
    if(window.innerWidth<=640){
      document.getElementById('sidebar').classList.add('hidden');
    }
  }
}

function renderChat(u,scrollToBottom){
  const[ac,bg]=getColor(u.uid);
  const ini=u.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'??';
  const qCnt=u.msgs.filter(m=>m.role==='user'&&!m.text.startsWith('[')).length;
  const bCnt=u.msgs.filter(m=>m.role==='bot'&&m.reply).length;
  const days=new Set(u.msgs.map(m=>m.ts.split(' ')[0])).size;

  document.getElementById('main').innerHTML=`
    <div class="back-btn" onclick="goBack()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      Назад
    </div>
    <div class="chat-header">
      <div class="ch-avatar" style="background:${bg};color:${ac}">${ini}</div>
      <div class="ch-info"><h2>${u.name}</h2><p>ID: ${u.uid}</p></div>
      <div class="ch-stats">
        <div class="stat"><div class="stat-v">${qCnt}</div><div class="stat-l">Вопросов</div></div>
        <div class="stat"><div class="stat-v">${bCnt}</div><div class="stat-l">Ответов</div></div>
        <div class="stat"><div class="stat-v">${days}</div><div class="stat-l">Дней</div></div>
      </div>
    </div>
    <div class="chat-messages" id="cm"></div>`;

  const cm=document.getElementById('cm');
  let lastDate=null,delay=0;
  u.msgs.forEach(msg=>{
    const parts=(msg.ts+' ').split(' ');const d=parts[0],t=parts[1]||'';
    const isNav=msg.text&&msg.text.startsWith('[');
    const displayText=msg.role==='user'?msg.text:msg.reply;
    if(d&&d!==lastDate){const s=document.createElement('div');s.className='date-sep';s.innerHTML=`<span>${d}</span>`;cm.appendChild(s);lastDate=d;}
    if(isNav){const w=document.createElement('div');w.className='nav-wrap';w.innerHTML=`<span class="nav-pill">🔘 ${msg.text}${t?' · '+t:''}</span>`;cm.appendChild(w);return;}
    if(!displayText)return;
    const isUser=msg.role==='user';
    const row=document.createElement('div');
    row.className='msg-row '+(isUser?'user':'bot');
    row.style.animationDelay=delay+'ms';delay+=25;
    const avS=isUser?`style="background:${bg};color:${ac}"`:`style="background:#1a3d28;color:#43e97b"`;
    const tc=TAG_CLASS[msg.intent]||'t-other';
    const tl=TAG_LABEL[msg.intent]||msg.intent;
    const tagHtml=msg.intent&&isUser&&!['browse_menu','view_service'].includes(msg.intent)?`<div class="tag ${tc}">${tl}</div>`:'';
    row.innerHTML=`<div class="msg-av" ${avS}>${isUser?ini:'🤖'}</div><div class="bw">${tagHtml}<div class="bubble">${displayText}</div><div class="btime">${t}</div></div>`;
    cm.appendChild(row);
  });
  if(scrollToBottom)cm.scrollTop=cm.scrollHeight;
}

function goBack(){
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('main').innerHTML=`<div class="empty"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>Выберите пользователя</p></div>`;
  activeUid=null;
}

/* ── TAB 1: users profiles ── */
function renderUsersTab(){
  const rows=tableData[1]||[];
  const main=document.getElementById('main');
  if(!rows.length){
    main.innerHTML=`<div class="loading-s"><div class="spinner"></div> Загрузка...</div>`;return;
  }
  main.innerHTML='<div class="users-panel" id="usersPanel"></div>';
  const panel=document.getElementById('usersPanel');

  rows.filter(r=>r['user_name']||r['name']).forEach(r=>{
    const name=r['user_name']||r['name']||'—';
    const uid=r['user_id']||r['uid']||'';
    const firstSeen=r['first_seen']||'—';
    const lastSeen=r['last_seen']||'—';
    const memory=r['memory_summary']||'Нет данных';
    const[ac,bg]=getColor(uid||name);
    const ini=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'??';

    const card=document.createElement('div');
    card.className='user-profile-card';
    card.innerHTML=`
      <div class="upc-top">
        <div class="upc-avatar" style="background:${bg};color:${ac}">${ini}</div>
        <div>
          <div class="upc-name">${name}</div>
          <div class="upc-id">ID: ${uid}</div>
        </div>
      </div>
      <div class="upc-dates">
        <div class="upc-date">
          <div class="upc-date-label">🟢 Первый визит</div>
          <div class="upc-date-val">${firstSeen}</div>
        </div>
        <div class="upc-date">
          <div class="upc-date-label">🕐 Последний визит</div>
          <div class="upc-date-val">${lastSeen}</div>
        </div>
      </div>
      <div class="upc-memory">
        <div class="upc-memory-label">🧠 Память о пользователе</div>
        <div class="upc-memory-text">${memory}</div>
      </div>`;
    panel.appendChild(card);
  });
}

// Init
loadAll(false);
setInterval(()=>loadAll(true),REFRESH_MS);
